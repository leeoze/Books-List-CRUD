name: CI CD for Books List CRUD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do repositório para a máquina virtual do GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configura o Python (forçando 3.11 para garantir suporte ao list[Livro])
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Ativa o cache automático para acelerar os próximos deploys

    # 3. Instala as dependências listadas no seu requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Executa uma checagem rápida de sintaxe (Linter) para evitar erros bobos
    - name: Lint with flake8 (Syntax check)
      run: |
        pip install flake8
        # para o build se houver erros de sintaxe Python
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 5. Roda a suite de testes automatizados
    - name: Run tests with pytest
      run: |
        pytest